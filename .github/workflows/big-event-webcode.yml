name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.BIG_EVENT_WEBCODE_TOKEN4 }}

      - name: Build Docker image
        run: docker build . --file ./frontend/Dockerfile --tag ghcr.io/siberianhusky10/big-event-webapi:latest

      - name: Push to GitHub Packages
        run: docker push ghcr.io/siberianhusky10/big-event-webapi:latest